name: build-windows

on:
  push:
    branches:
      - main
    tags:
      - "v*"
  pull_request:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest
    env:
      PACKAGE_NAME: ${{ startsWith(github.ref, 'refs/tags/v') && format('LuluPet-win-x64-{0}', github.ref_name) || format('LuluPet-win-x64-ci-{0}', github.run_number) }}

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: "8.0.x"

      - name: Restore
        run: dotnet restore

      - name: Test
        run: dotnet test --configuration Release --no-restore

      - name: Publish
        run: >
          dotnet publish src/LuluPet.App/LuluPet.App.csproj
          -c Release
          -r win-x64
          --self-contained true
          /p:PublishSingleFile=true
          /p:IncludeNativeLibrariesForSelfExtract=true
          /p:EnableWindowsTargeting=true
          -o publish/win-x64

      - name: Copy runtime assets
        shell: pwsh
        run: |
          $publishDir = "publish/win-x64"
          $assetsDir = Join-Path $publishDir "Assets"

          New-Item -ItemType Directory -Path $assetsDir -Force | Out-Null

          $assetGroups = @(
            @{ Source = "assets/icons"; Target = "Assets/icons" },
            @{ Source = "assets/ui"; Target = "Assets/ui" },
            @{ Source = "assets/dialogues"; Target = "Assets/dialogues" },
            @{ Source = "assets/pet"; Target = "Assets/pet" }
          )

          foreach ($assetGroup in $assetGroups) {
            $source = $assetGroup.Source
            $target = Join-Path $publishDir $assetGroup.Target

            if (!(Test-Path $source)) {
              throw "Required asset source not found: $source"
            }

            if (Test-Path $target) {
              Remove-Item $target -Recurse -Force
            }

            New-Item -ItemType Directory -Path $target -Force | Out-Null
            Copy-Item (Join-Path $source "*") $target -Recurse -Force
          }

          Copy-Item "settings.json" (Join-Path $publishDir "settings.json") -Force

      - name: Verify artifact
        shell: pwsh
        run: |
          if (!(Test-Path "publish/win-x64/LuluPet.exe")) {
            Get-ChildItem "publish/win-x64" -Recurse | Select-Object FullName, Length
            throw "LuluPet.exe not found"
          }
          $file = Get-Item "publish/win-x64/LuluPet.exe"
          if ($file.Length -lt 1MB) {
            throw "LuluPet.exe is suspiciously small"
          }
          Get-FileHash "publish/win-x64/LuluPet.exe" -Algorithm SHA256 |
            Tee-Object -FilePath "publish/win-x64/LuluPet.exe.sha256.txt"

          $requiredPaths = @(
            "publish/win-x64/Assets/icons/app.ico",
            "publish/win-x64/Assets/ui/bubble_default.png",
            "publish/win-x64/Assets/dialogues/lines.json",
            "publish/win-x64/Assets/pet/idle/lulu_idle_0001.png",
            "publish/win-x64/settings.json"
          )

          foreach ($requiredPath in $requiredPaths) {
            if (!(Test-Path $requiredPath)) {
              Get-ChildItem "publish/win-x64" -Recurse | Select-Object FullName, Length
              throw "Required runtime asset not found: $requiredPath"
            }
          }

      - name: Package release zip
        shell: pwsh
        run: |
          $packageRoot = "publish/package/$env:PACKAGE_NAME"
          $packageZip = "publish/$env:PACKAGE_NAME.zip"
          if (Test-Path $packageRoot) {
            Remove-Item $packageRoot -Recurse -Force
          }
          New-Item -ItemType Directory -Path $packageRoot | Out-Null
          Copy-Item "publish/win-x64/*" $packageRoot -Recurse

          if (Test-Path $packageZip) {
            Remove-Item $packageZip -Force
          }
          Compress-Archive -Path "$packageRoot/*" -DestinationPath $packageZip -CompressionLevel Optimal

          $zipFile = Get-Item $packageZip
          if ($zipFile.Length -lt 1MB) {
            throw "$packageZip is suspiciously small"
          }

          Add-Type -AssemblyName System.IO.Compression.FileSystem
          $zip = [System.IO.Compression.ZipFile]::OpenRead($packageZip)
          try {
            $entries = $zip.Entries | ForEach-Object { $_.FullName }
            if (!($entries -contains "LuluPet.exe")) {
              throw "LuluPet.exe not found in package zip"
            }
            if (!($entries | Where-Object { $_ -like "Assets/pet/*" })) {
              throw "Assets/pet frames not found in package zip"
            }
            if (!($entries | Where-Object { $_ -like "Assets/ui/*" })) {
              throw "Assets/ui files not found in package zip"
            }
            if (!($entries | Where-Object { $_ -like "Assets/icons/*" })) {
              throw "Assets/icons files not found in package zip"
            }
            if (!($entries -contains "settings.json")) {
              throw "settings.json not found in package zip"
            }
          } finally {
            $zip.Dispose()
          }

          Get-FileHash $packageZip -Algorithm SHA256 |
            Tee-Object -FilePath "$packageZip.sha256.txt"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.PACKAGE_NAME }}
          path: |
            publish/${{ env.PACKAGE_NAME }}.zip
            publish/${{ env.PACKAGE_NAME }}.zip.sha256.txt
          retention-days: 14

      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        shell: pwsh
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          RELEASE_TAG: ${{ github.ref_name }}
        run: |
          $packageZip = "publish/$env:PACKAGE_NAME.zip"
          $assets = @(
            $packageZip,
            "$packageZip.sha256.txt"
          )
          $notes = @(
            "LuluPet $env:RELEASE_TAG",
            "",
            "Assets:",
            "- $env:PACKAGE_NAME.zip: Windows x64 package including LuluPet.exe, Assets, and settings.json",
            "- $env:PACKAGE_NAME.zip.sha256.txt: SHA256 checksum",
            "",
            "GitHub also provides Source code zip/tar.gz automatically for this tag.",
            "",
            "Download the zip, extract it, then run LuluPet.exe from the extracted folder."
          ) -join [Environment]::NewLine

          if (gh release view $env:RELEASE_TAG 2>$null) {
            gh release upload $env:RELEASE_TAG @assets --clobber
          } else {
            gh release create $env:RELEASE_TAG @assets --title "LuluPet $env:RELEASE_TAG" --notes $notes
          }
