name: build-windows

on:
  push:
    branches:
      - main
    tags:
      - "v*"
  pull_request:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: "8.0.x"

      - name: Restore
        run: dotnet restore

      - name: Test
        run: dotnet test --configuration Release --no-restore

      - name: Publish
        run: >
          dotnet publish src/LuluPet.App/LuluPet.App.csproj
          -c Release
          -r win-x64
          --self-contained true
          /p:PublishSingleFile=true
          /p:IncludeNativeLibrariesForSelfExtract=true
          /p:EnableWindowsTargeting=true
          -o publish/win-x64

      - name: Verify artifact
        shell: pwsh
        run: |
          if (!(Test-Path "publish/win-x64/LuluPet.exe")) {
            Get-ChildItem "publish/win-x64" -Recurse | Select-Object FullName, Length
            throw "LuluPet.exe not found"
          }
          $file = Get-Item "publish/win-x64/LuluPet.exe"
          if ($file.Length -lt 1MB) {
            throw "LuluPet.exe is suspiciously small"
          }
          Get-FileHash "publish/win-x64/LuluPet.exe" -Algorithm SHA256 |
            Tee-Object -FilePath "publish/win-x64/LuluPet.exe.sha256.txt"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: LuluPet-win-x64
          path: publish/win-x64/
          retention-days: 14

      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        shell: pwsh
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          RELEASE_TAG: ${{ github.ref_name }}
        run: |
          $assets = @(
            "publish/win-x64/LuluPet.exe",
            "publish/win-x64/LuluPet.exe.sha256.txt"
          )
          $notes = @(
            "LuluPet $env:RELEASE_TAG",
            "",
            "Assets:",
            "- LuluPet.exe: Windows x64 self-contained executable",
            "- LuluPet.exe.sha256.txt: SHA256 checksum",
            "",
            "Manual acceptance should be completed on a Windows desktop after download."
          ) -join [Environment]::NewLine

          if (gh release view $env:RELEASE_TAG 2>$null) {
            gh release upload $env:RELEASE_TAG @assets --clobber
          } else {
            gh release create $env:RELEASE_TAG @assets --title "LuluPet $env:RELEASE_TAG" --notes $notes
          }
